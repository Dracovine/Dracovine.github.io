<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> SIRSWIM | Blog</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --secondary: #666666;
            --accent: #0070f3;
            --border: #eaeaea;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --text: #ededed;
                --secondary: #a0a0a0;
                --border: #333333;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
            max-width: 650px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        nav a {
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-right: 1.5rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--text);
        }

        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-item {
            margin-bottom: 2.5rem;
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--secondary);
            display: block;
            margin-bottom: 0.25rem;
        }

        .post-title {
            font-size: 1.2rem;
            font-weight: 500;
            text-decoration: none;
            color: var(--text);
            display: inline-block;
        }

        .post-title:hover {
            color: var(--accent);
        }

        .post-excerpt {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: var(--secondary);
        }

        footer {
            margin-top: 5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--secondary);
        }

        a.external {
            text-decoration: underline;
            color: inherit;
        }
    </style>
</head>
<body>

    <header>
        <h1> Hoek's Hoek </h1>
        <nav>
            <a href="index.html">Blog</a>
            <a href="#">Projects</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
    </main>

    <footer>
        <p>&copy; 2023 Your Name. Built with simplicity. <a href="https://github.com/yourusername" class="external">GitHub</a></p>
    </footer>

</body>
</html>
